spring:
  application:
    name: estructuras-datos
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/estructuras_datos}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTThatIsAtLeast32CharactersLong123}
    expiration: 86400000
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:estructuras-datos}
  recommendation:
    evaluacion-fallo-threshold: 2
    tiempo-factor-threshold: 2.0
    completitud-threshold: 0.60
    inactividad-dias: 3
